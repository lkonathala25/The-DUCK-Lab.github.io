- id: doi:10.48550/arXiv.2502.18237
  type: paper
  image: /images/research/DRL.png
  description: We introduce the Disjunctive Refinement Layer (DRL), a novel layer designed to enforce the alignment of generated data with the background knowledge specified in user-defined constraints. DRL is the first method able to automatically make deep learning models inherently compliant with constraints as expressive as quantifier-free linear formulas, which can define non-convex and even disconnected spaces.
  publisher: ICLR
  buttons:
    - type: source
      text: Code
      link: https://github.com/mihaela-stoian/DRL_DGM


- id: doi:10.3233/FAIA250782
  type: paper
  image: /images/research/ECAI.png
  publisher: ECAI
  date: '2025-07-10'
  description: "We contrast two approaches to ensuring machine learning systems satisfy formal requirements in safety-critical settings: integrating requirements directly into model architecture and training (a priori design) versus analyzing trained models for desired properties (a posteriori verification)."


