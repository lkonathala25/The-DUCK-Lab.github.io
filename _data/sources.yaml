- id: doi:10.48550/arXiv.2503.05954
  type: paper
  image: /images/research/survey_tab_synth.png
  description: "We review deep generative modelling approaches for tabular data from the perspective of four types of requirements: utility of the synthetic data, alignment of the synthetic data with domain-specific knowledge, statistical fidelity of the synthetic data distribution compared to the real data distribution, and privacy-preserving capabilities."
  publisher: TMLR
  date: '2026-01-01'



- id: doi:10.48550/arXiv.2402.04823
  type: paper
  image: /images/research/dgm+ll.png
  publisher: ICLR
  description: We show how deep generative models for tabular data can be constrained such that their generated samples are guaranteed to be compliant with given constraints. This is achieved by automatically parsing the constraints and transforming them into a Constraint Layer seamlessly integrated with the model.
  buttons:
    - type: source
      text: Code
      link: https://github.com/mihaela-stoian/ConstrainedDGM


- id: doi:10.48550/arXiv.2409.12642
  type: paper
  image: /images/research/adv_gan.png
  description: We adapt popular tabular deep generative models into adversarial models and evaluate their effectiveness in generating realistic adversarial examples that conform to domain constraints.
  publisher: ICMLC
  buttons:
    - type: source
