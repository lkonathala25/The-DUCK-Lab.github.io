- id: doi:10.1016/j.ijar.2024.109124
  type: paper
  publisher: "International Journal of Approximate Reasoning"
  description: "We present CCN+, a neuro-symbolic framework that integrates logical requirements directly into neural network outputs using inference rules to ensure compliance, and adapts the standard binary cross-entropy loss for constraint satisfaction in deep learning."


- id: doi:10.1007/978-3-031-71167-1_12
  type: paper
  image: /images/research/ULLER.png
  publisher: "NeSy (Spotlight)"
  description: "We introduce ULLER, a unified language for learning and reasoning that standardises how background knowledge is expressed across neuro-symbolic AI frameworks. ULLER provides first-order logic syntax with multiple semantic interpretations."


- id: doi:10.48550/arXiv.2402.18285
  type: paper
  image: /images/research/pishield_demo.png
  description: We introduce PiShield, the first package ever allowing for the integration of (propositional or linear) requirements into the neural networks’ topology. PiShield guarantees compliance with these requirements, regardless of input.
