<header>
  <div class="header-inner container">
    <a href="{{ "/" | relative_url }}" class="brand" aria-label="DUCK Lab — Home">
      {% include logo-mark.html %}
      <span class="brand-text">DUCK <em>Lab</em></span>
    </a>

    <input class="nav-toggle" id="nav-toggle" type="checkbox" aria-label="show/hide navigation">
    <label for="nav-toggle" class="nav-toggle-label" aria-hidden="true">
      <span></span><span></span><span></span>
    </label>

    <nav>
      {% assign pages = site.pages
        | where_exp: "page", "page.nav"
        | sort: "nav.order"
      %}
      {% for p in pages %}
        <a href="{{ p.dir | relative_url | uri_escape }}">{{ p.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
